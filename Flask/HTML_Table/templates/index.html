<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Table</title>
  <!-- Bootstrap CSS for styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <table class="table table-bordered table-striped table-collapse container mt-5 text-center">
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Full Name</th>
      </tr>
    </thead>

    <!-- Table body - iterate through users from Flask backend -->
    <tbody>
      {% for user in users %}
      <tr>
        <td>{{ user.first_name }}</td>
        <td>{{ user.last_name }}</td>
        <!-- Display full name by concatenating first and last names -->
        <td>{{ user.first_name }} {{ user.last_name }}</td>
      </tr>
      {% endfor %}
    </tbody>

  </table>
</body>

</html>
