<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dojo Survey</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body>
  <div class="container">
    <h1 class="text-center mt-3">Dojo Survey</h1>
    <form action="/process" method="post">
      <div class="form-group mb-3">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>
      <div class="form-group mb-3">
        <label for="location">Location:</label>
        <select id="location" name="location" class="form-select" required>
          <option value="">Select a location</option>
          <option value="alquds">Al-Quds</option>
          <option value="ramallah">Ramallah</option>
          <option value="gaza">Gaza</option>
        </select>
      </div>

      <div class="form-group">
        <label for="language">Favorite Languages:</label>
        <div>
          <input type="checkbox" id="language" name="languages[]" value="python">
          <label for="language">Python</label>
        </div>
        <div>
          <input type="checkbox" id="language" name="languages[]" value="js">
          <label for="language">JavaScript</label>
        </div>
        <div>
          <input type="checkbox" id="language" name="languages[]" value="php">
          <label for="language">PHP</label>
        </div>

        <div class="form-group mb-3">
          <label for="comment">Comment (optional):</label><br>
          <textarea id="comment" name="comment" rows="4" cols="20" class="form-control"></textarea>
        </div>

        <input type="submit" value="Submit" class="btn btn-primary px-3">
    </form>
  </div>
</body>

</html>
